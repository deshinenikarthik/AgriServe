# ==========================================
# GLOBAL CONFIGURATION
# ==========================================
spring.application.name=api-gateway
server.port=8081
spring.main.allow-bean-definition-overriding=true
logging.level.org.springframework.cloud.gateway=TRACE

# ==========================================
# EUREKA & SECURITY
# ==========================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
jwt.secret=mysecretkeymysecretkeymysecretkeymysecretkey

# ==========================================
# GLOBAL CORS CONFIGURATION
# ==========================================
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true

# ==========================================
# CORE SERVICES (Auth, Compliance, User, Farmer)
# ==========================================

spring.config.import=optional:configserver:http://localhost:8888

# 1. Auth Service (Handles both /auth and /api/auth)
spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**, /api/auth/**

# 2. Compliance Service (Handles Compliance Records AND Audits)
spring.cloud.gateway.server.webflux.routes[1].id=compliance-records
spring.cloud.gateway.server.webflux.routes[1].uri=lb://COMPLIANCE-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/compliance-records/**

spring.cloud.gateway.server.webflux.routes[2].id=audit
spring.cloud.gateway.server.webflux.routes[2].uri=lb://COMPLIANCE-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/audits/**

# 3. User Service
spring.cloud.gateway.server.webflux.routes[3].id=user-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/users/**

# 4. Farmer Service (Handles Farmer Profiles AND Farmer Documents)
spring.cloud.gateway.server.webflux.routes[4].id=farmer-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://FARMER-SERVICE
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/farmers/**

# 5. Training Service
spring.cloud.gateway.server.webflux.routes[5].id=training-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://TRAINING-SERVICE
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/programs/**, /api/workshops/**, /api/participations/**

# 6. Advisory Service
spring.cloud.gateway.server.webflux.routes[6].id=advisory-service
spring.cloud.gateway.server.webflux.routes[6].uri=lb://ADVISORY-SERVICE
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/advisory-sessions/**, /api/advisory-content/**

## 7. Feedback and Satisfaction Service
spring.cloud.gateway.server.webflux.routes[7].id=feedbackandsatisfaction-service
spring.cloud.gateway.server.webflux.routes[7].uri=lb://FEEDBACKANDSATISFACTION-SERVICE
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/api/feedback/**, /api/satisfaction-metrics/**